services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-openport}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-openport}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - openport-postgres:/var/lib/postgresql/data

  reference-server:
    build:
      context: ..
      dockerfile: docker/reference-server.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      PORT: ${REFERENCE_PORT:-8080}
      HOST: ${REFERENCE_HOST:-0.0.0.0}
      OPENPORT_DOMAIN_ADAPTER: ${OPENPORT_DOMAIN_ADAPTER:-memory}
      OPENPORT_DATABASE_URL: ${OPENPORT_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/openport}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${REFERENCE_HOST_PORT:-8080}:8080"

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      PORT: ${PORT:-4000}
      HOST: ${HOST:-0.0.0.0}
      OPENPORT_DOMAIN_ADAPTER: ${OPENPORT_DOMAIN_ADAPTER:-memory}
      OPENPORT_DATABASE_URL: ${OPENPORT_DATABASE_URL:-postgres://postgres:postgres@postgres:5432/openport}
      OPENPORT_API_STATE_BACKEND: postgres
      OPENPORT_API_STATE_FILE: ${OPENPORT_API_STATE_FILE:-/app/.openport-product/data/api-state.json}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_HOST_PORT:-4100}:4000"
    volumes:
      - openport-api-data:/app/.openport-product/data

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      PORT: 3000
      OPENPORT_INTERNAL_API_BASE_URL: http://api:4000/api
      NEXT_PUBLIC_OPENPORT_API_BASE_URL: ${NEXT_PUBLIC_OPENPORT_API_BASE_URL:-http://127.0.0.1:${API_HOST_PORT:-4100}/api}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-3100}:3000"

volumes:
  openport-postgres:
  openport-api-data:
