name: product-validation

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  product-apps:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install product app dependencies
        run: npm run install:product

      - name: Prepare env
        run: npm run env:product

      - name: Product app acceptance
        run: npm run acceptance:apps
